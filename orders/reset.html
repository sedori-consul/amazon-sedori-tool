<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>リセット中...</title></head>
<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
<h2 id="msg">キャッシュをクリア中...</h2>
<script>
(async function() {
  const m = document.getElementById('msg');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.unregister();
    const keys = await caches.keys();
    for (const k of keys) await caches.delete(k);
    // 旧データも全削除
    ['order_parsed_data','order_has_asin','order_cost_map','oa_inventory_map','oa_order_data','oa_cost_map'].forEach(k => localStorage.removeItem(k));
    m.textContent = 'クリア完了。リダイレクト中...';
    setTimeout(() => { location.href = './index.html?t=' + Date.now(); }, 1000);
  } catch(e) { m.textContent = 'エラー: ' + e.message; }
})();
</script>
</body></html>
